<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SecureAuth</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="glass-card welcome-card">
            <div class="welcome-header">
                <div class="user-profile">
                    <div class="avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                    <div class="user-info">
                        <h2 id="welcomeUsername">Welcome!</h2>
                        <p id="userEmail"></p>
                        <div class="security-status">
                            <span class="badge secure"><i class="fas fa-shield-alt"></i> Secure Session</span>
                        </div>
                    </div>
                </div>
                <button id="logoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-chart-line"></i>
                    <h3 id="totalLogins">0</h3>
                    <p>Total Logins</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <h3>Active</h3>
                    <p>Session Status</p>
                </div>
                <div class="stat-card">
                    <i class="fas fa-calendar"></i>
                    <h3 id="memberSince">-</h3>
                    <p>Member Since</p>
                </div>
            </div>
            
            <div class="chart-container">
                <canvas id="activityChart"></canvas>
            </div>
        </div>
    </div>
    
    <!-- Logout Confirmation Modal -->
    <div id="logoutConfirmModal" class="modal hidden">
        <div class="modal-content" style="max-width: 350px; text-align: center;">
            <h3><i class="fas fa-question-circle"></i> Confirm Logout</h3>
            <p style="margin: 20px 0;">Are you sure you want to logout?</p>
            <div style="display: flex; gap: 10px;">
                <button id="confirmLogoutBtn" class="btn-primary" style="background: #dc3545;">Yes, Logout</button>
                <button id="cancelLogoutBtn" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>
    
    <script src="js/api.js"></script>
    <script src="js/welcome.js"></script>
</body>
</html>
